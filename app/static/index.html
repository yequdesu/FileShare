<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FileShare</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">
  <header id="topbar">
    <span class="topbar-left">FileShare</span>
    <div class="topbar-right">
      <span id="user-count">0 online</span>
      <div id="storage-info">
        <div id="storage-bar-track"><div id="storage-bar-fill"></div></div>
        <span id="storage-text"></span>
      </div>
    </div>
  </header>

  <div id="workspace">
    <aside id="sidebar">
      <div id="sidebar-header">
        <span>EXPLORER</span>
        <div id="sidebar-actions">
          <button id="btn-new-folder" title="New Folder">+</button>
          <button id="btn-upload" title="Upload">^</button>
        </div>
      </div>
      <div id="sidebar-scroll">
        <div id="tree-root"></div>
      </div>
    </aside>

    <main id="main">
      <div id="main-toolbar">
        <span id="selected-breadcrumb"></span>
        <div id="file-actions" style="display:none">
          <button id="btn-download">Download</button>
          <button id="btn-delete">Delete</button>
        </div>
      </div>
      <div id="main-content">
        <div id="drop-zone">
          <div class="drop-inner">
            <p class="drop-title">Drop files here to upload</p>
            <p class="drop-hint">or click to browse</p>
          </div>
        </div>
        <iframe id="preview-frame" style="display:none"></iframe>
      </div>
      <input type="file" id="file-input" multiple hidden>
    </main>
  </div>
</div>

<div id="modal-mask" style="display:none">
  <div id="modal-box">
    <p id="modal-msg"></p>
    <input id="modal-input" type="text" placeholder="folder name">
    <div id="modal-actions">
      <button id="modal-cancel">Cancel</button>
      <button id="modal-ok">OK</button>
    </div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
