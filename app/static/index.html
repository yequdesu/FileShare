<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FileShare</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="/static/codicon.css">
</head>
<body>
<div id="app">
  <header id="topbar">
    <span class="topbar-left">FileShare</span>
    <div class="topbar-right">
      <span id="user-count">0 online</span>
      <div id="storage-info">
        <div id="storage-bar-track"><div id="storage-bar-fill"></div></div>
        <span id="storage-text"></span>
      </div>
    </div>
  </header>

  <div id="workspace">
    <aside id="sidebar">
      <div id="sidebar-header">
        <span>EXPLORER</span>
        <div id="sidebar-actions">
          <button id="btn-new-file" class="codicon codicon-new-file" title="New File"></button>
          <button id="btn-new-folder" class="codicon codicon-new-folder" title="New Folder"></button>
          <button id="btn-refresh" class="codicon codicon-refresh" title="Refresh"></button>
        </div>
      </div>
      <div id="sidebar-scroll">
        <div id="tree-root"></div>
      </div>
    </aside>

    <main id="main">
      <div id="main-toolbar">
        <span id="selected-breadcrumb"></span>
        <div id="file-actions" style="display:none">
          <button id="btn-download">Download</button>
          <button id="btn-delete">Delete</button>
        </div>
      </div>
      <div id="main-content">
        <div id="drop-zone">
          <div class="drop-inner">
            <p class="drop-title">Drop files here to upload</p>
            <p class="drop-hint">or click to browse</p>
          </div>
        </div>
        <iframe id="preview-frame" style="display:none"></iframe>
      </div>
      <input type="file" id="file-input" multiple hidden>
    </main>
  </div>
</div>

<div id="modal-mask" style="display:none">
  <div id="modal-box">
    <p id="modal-msg"></p>
    <input id="modal-input" type="text" placeholder="folder name">
    <div id="modal-actions">
      <button id="modal-cancel">Cancel</button>
      <button id="modal-ok">OK</button>
    </div>
  </div>
</div>

<!-- context menu -->
<div id="ctx-menu" style="display:none">
  <div class="ctx-item" data-action="new-file"><span class="codicon codicon-new-file ctx-icon"></span>New File</div>
  <div class="ctx-item" data-action="new-folder"><span class="codicon codicon-new-folder ctx-icon"></span>New Folder</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" data-action="open"><span class="codicon codicon-file ctx-icon"></span>Open</div>
  <div class="ctx-item" data-action="download" data-only-file><span class="codicon codicon-cloud-download ctx-icon"></span>Download</div>
  <div class="ctx-item" data-action="upload-here" data-only-dir><span class="codicon codicon-cloud-upload ctx-icon"></span>Upload Here</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" data-action="rename"><span class="codicon codicon-edit ctx-icon"></span>Rename</div>
  <div class="ctx-item" data-action="delete"><span class="codicon codicon-trash ctx-icon"></span>Delete<span class="ctx-shortcut">Del</span></div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" data-action="copy-path"><span class="codicon codicon-copy ctx-icon"></span>Copy Path<span class="ctx-shortcut">Ctrl+Shift+C</span></div>
  <div class="ctx-item" data-action="copy-rel-path"><span class="codicon codicon-link ctx-icon"></span>Copy Relative Path</div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
